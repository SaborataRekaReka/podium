name: Deploy to podium-cordiant server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Preflight remote write check
        run: |
          ssh -p "${SSH_PORT:-22}" -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$DEPLOY_PATH' && touch '$DEPLOY_PATH/.deploy_write_test' && rm -f '$DEPLOY_PATH/.deploy_write_test'"

      - name: Rsync to server
        run: |
          rsync -rlz \
            --omit-dir-times \
            --no-perms --no-owner --no-group \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "logs/" \
            --exclude "backups/" \
            --exclude ".well-known/" \
            -e "ssh -p ${SSH_PORT:-22} -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=6" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
